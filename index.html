<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Gravity Swarm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: crosshair; /* Đổi con trỏ chuột cho ngầu hơn */
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-family: sans-serif;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="ui">Di chuyển chuột để điều khiển trọng lực</div>
    <canvas id="spaceCanvas"></canvas>

    <script>
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        // Tọa độ mặc định ban đầu là giữa màn hình
        let mouse = { x: 0, y: 0 }; 
        
        // Cấu hình vật lý
        const STAR_COUNT = 36000;
        const G = 1600; // Lực hấp dẫn
        const FRICTION = 0.98; // Ma sát không gian để tránh bay quá đà
        const MIN_DIST = 15; // Giới hạn khoảng cách gần nhất để không bị gia tốc vô hạn

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (mouse.x === 0 && mouse.y === 0) {
                mouse.x = width / 2;
                mouse.y = height / 2;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Lắng nghe vị trí chuột
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Hỗ trợ cả trên điện thoại (chạm và lướt)
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                // Vận tốc ban đầu ngẫu nhiên
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;

                this.mass = Math.random() * 1.5 + 0.5;
                // Màu ngẫu nhiên từ dải xanh lam đến tím/hồng
                this.color = `hsl(${200 + Math.random() * 120}, 100%, ${60 + Math.random() * 40}%)`;
            }

            update() {
                // Tính toán lực hấp dẫn hướng về phía con trỏ chuột
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                let distSq = dx * dx + dy * dy;
                
                // Áp dụng khoảng cách tối thiểu để tránh lỗi chia cho 0 và gia tốc phi lý
                if (distSq < MIN_DIST * MIN_DIST) {
                    distSq = MIN_DIST * MIN_DIST;
                }
                
                const distance = Math.sqrt(distSq);

                // Lực hấp dẫn F = G / r^2
                const force = G / distSq;
                const ax = force * (dx / distance) / this.mass;
                const ay = force * (dy / distance) / this.mass;

                this.vx += ax;
                this.vy += ay;

                // Thêm ma sát để các ngôi sao tạo thành "đám mây" quanh chuột thay vì văng mất
                this.vx *= FRICTION;
                this.vy *= FRICTION;

                this.x += this.vx;
                this.y += this.vy;

                // Bật ngược lại nếu đập vào viền màn hình (tùy chọn để giữ chúng không bay mất)
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const stretch = Math.min(speed * 2, 80); // Độ dài vệt sáng dựa trên tốc độ

                // Căng vector theo hướng di chuyển
                let dirX = this.vx / (speed || 1);
                let dirY = this.vy / (speed || 1);

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - dirX * stretch, this.y - dirY * stretch);
                
                ctx.strokeStyle = this.color;
                ctx.lineWidth = Math.max(1, 4 - speed * 0.1); 
                
                // Hiệu ứng phát sáng
                if (speed > 8) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        const stars = Array.from({ length: STAR_COUNT }, () => new Star());

        function animate() {
            // Hiệu ứng làm mờ chuyển động (Motion blur)
            ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // Tùy chọn: Vẽ một điểm sáng mờ ở ngay vị trí chuột
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#fff';
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Cập nhật và vẽ các ngôi sao
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
